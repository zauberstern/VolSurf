[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers -s
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s  %(levelname)-8s  %(message)s
log_cli_date_format = %H:%M:%S
markers =
    wrds: mark test as requiring a live WRDS connection (skipped when credentials absent)
